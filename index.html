<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pepito Area Denpasar — Command Center</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --green: #00843D; --green-d: #006B31; --green-l: #E3F1E8;
    --red: #E24B4A; --red-l: #FCEBEB; --red-d: #A32D2D;
    --amber: #EF9F27; --amber-l: #FEF9E7; --amber-d: #854F0B;
    --blue: #378ADD; --blue-l: #E6F1FB; --blue-d: #0C447C;
    --purple: #634AB7;
    --bg: #F7F7F5; --surface: #FFFFFF; --border: rgba(0,0,0,0.1);
    --text: #1A1A18; --muted: #6B6B68;
    --radius: 10px; --radius-sm: 6px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--green-d); color: #fff;
    padding: 14px 20px; display: flex; align-items: center;
    gap: 12px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,.2);
  }
  .header .logo { width: 6px; height: 28px; background: #fff; border-radius: 3px; opacity: .8; }
  .header h1 { font-size: 15px; font-weight: 600; flex: 1; }
  .header .meta { font-size: 11px; opacity: .7; }
  .conn { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .conn.ok { background: rgba(255,255,255,.2); color: #fff; }
  .conn.err { background: #FCEBEB; color: #A32D2D; }
  .conn.wait { background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); }
  .sp { width: 11px; height: 11px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: sp .7s linear infinite; display: inline-block; }
  @keyframes sp { to { transform: rotate(360deg); } }

  /* TABS */
  .tabs { background: #fff; border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 0 20px; position: sticky; top: 57px; z-index: 99; }
  .tab { padding: 12px 16px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 3px solid transparent; white-space: nowrap; font-weight: 500; transition: all .15s; }
  .tab:hover { color: var(--text); }
  .tab.on { color: var(--green); border-bottom-color: var(--green); }

  /* MAIN */
  .main { max-width: 960px; margin: 0 auto; padding: 20px 16px; }
  .pnl { display: none; } .pnl.on { display: block; }

  /* CARDS */
  .kgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kc { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .kc .l { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
  .kc .v { font-size: 22px; font-weight: 700; line-height: 1.1; }
  .kc .s { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .rv { color: var(--red-d); } .av { color: var(--amber-d); } .gv { color: var(--green-d); }

  /* SECTION */
  .sec { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .6px; text-transform: uppercase; margin: 20px 0 10px; }

  /* STORE CARDS */
  .sgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(185px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .sc { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; position: relative; }
  .sc .nm { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; padding-right: 52px; }
  .sc .val { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
  .sc .sub { font-size: 11px; color: var(--muted); }
  .bdg { position: absolute; top: 12px; right: 12px; font-size: 10px; padding: 3px 8px; border-radius: 99px; font-weight: 700; }
  .bdg-r { background: var(--red-l); color: var(--red-d); }
  .bdg-a { background: var(--amber-l); color: var(--amber-d); }
  .bdg-g { background: var(--green-l); color: var(--green-d); }
  .pb { height: 4px; background: #eee; border-radius: 99px; overflow: hidden; margin-top: 6px; }
  .pbi { height: 4px; border-radius: 99px; }

  /* ALERTS */
  .al { padding: 10px 14px; border-left: 3px solid; font-size: 13px; line-height: 1.55; margin-bottom: 8px; border-radius: 0 4px 4px 0; }
  .al-r { background: var(--red-l); border-color: var(--red); color: #3D0F0F; }
  .al-a { background: var(--amber-l); border-color: var(--amber); color: #3D2200; }
  .al-g { background: var(--green-l); border-color: var(--green); color: #0A2D18; }
  .al-b { background: var(--blue-l); border-color: var(--blue); color: #062040; }
  .al strong { font-weight: 600; }

  /* INPUT PANEL */
  .inp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 600px) { .inp-grid { grid-template-columns: 1fr; } }
  .form-group label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 6px; }
  input[type=date], select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: #fff; color: var(--text); }
  .mode-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .mtab { padding: 5px 14px; font-size: 12px; border: 1.5px solid var(--border); border-radius: 99px; background: none; color: var(--muted); cursor: pointer; font-weight: 500; transition: all .15s; }
  .mtab.on { background: var(--green); color: #fff; border-color: var(--green); }
  .stabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .stab { padding: 5px 14px; font-size: 12px; border: 1.5px solid var(--border); border-radius: 99px; background: none; color: var(--muted); cursor: pointer; font-weight: 500; }
  .stab.on { background: var(--green); color: #fff; border-color: var(--green); }
  .stab.hb { background: var(--green-d); color: #fff; border-color: var(--green-d); }
  .stab.hs { background: var(--blue-l); color: var(--blue-d); border-color: var(--blue); }
  .stab.hsh { background: var(--green-l); color: var(--green-d); border-color: var(--green); }
  textarea { width: 100%; font-family: 'Courier New', monospace; font-size: 12px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #FAFAF8; color: var(--text); resize: vertical; min-height: 140px; line-height: 1.6; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
  .gbtn { padding: 9px 20px; font-size: 13px; font-weight: 600; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; transition: background .15s; }
  .gbtn:hover { background: var(--green-d); }
  .gbtn:disabled { background: #999; cursor: not-allowed; }
  .lbtn { padding: 8px 16px; font-size: 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: #fff; color: var(--muted); cursor: pointer; font-weight: 500; transition: all .15s; }
  .lbtn:hover { border-color: var(--green); color: var(--green); }
  .sstat { font-size: 12px; color: var(--muted); }

  /* STATUS BOX */
  .sbox { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; line-height: 1.5; display: none; }
  .sbox.ok { background: var(--green-l); color: #0A2D18; display: block; }
  .sbox.err { background: var(--red-l); color: #3D0F0F; display: block; }
  .sbox.info { background: var(--blue-l); color: #062040; display: block; }

  /* SESSION STATUS */
  .sess-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; margin-top: 16px; }
  .sess-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
  .sess-card .sn { font-size: 12px; font-weight: 600; margin-bottom: 5px; }
  .sess-card .st { font-size: 11px; color: var(--muted); }
  .itag { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 700; margin-right: 3px; }
  .it-s { background: var(--blue-l); color: var(--blue-d); }
  .it-sh { background: var(--green-l); color: var(--green-d); }

  /* CHART */
  .cw { position: relative; width: 100%; margin-bottom: 20px; }
  .leg { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; }
  .leg span { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
  .leg b { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; display: inline-block; }

  /* TABLE */
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
  .tbl th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border); font-weight: 700; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
  .tbl td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .tbl .r { text-align: right; }
  .tbl tr:last-child td { font-weight: 700; border-bottom: none; background: #f9f9f7; }
  .flg { font-size: 11px; padding: 2px 7px; border-radius: 3px; font-weight: 700; }
  .fr { background: var(--red-l); color: var(--red-d); }
  .fa { background: var(--amber-l); color: var(--amber-d); }
  .fg { background: var(--green-l); color: var(--green-d); }

  /* DIVIDER */
  .hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  @media (max-width: 600px) { .main { padding: 14px 12px; } }
</style>
</head>
<body>

<div class="header">
  <div class="logo"></div>
  <h1>Pepito Area Denpasar — Command Center</h1>
  <span class="meta" id="csync"></span>
  <span class="conn wait" id="cpill"><span class="sp"></span> Connecting</span>
</div>

<div class="tabs">
  <button class="tab on" onclick="T('inp')">&#8593; Input</button>
  <button class="tab" onclick="T('sal')">&#128200; Sales</button>
  <button class="tab" onclick="T('shr')">&#9888; Shrinkage</button>
  <button class="tab" onclick="T('trf')">&#128101; Traffic</button>
  <button class="tab" onclick="T('ins')">&#128161; Insight</button>
  <button class="tab" onclick="T('mtd')">&#128203; MTD</button>
</div>

<div class="main">

  <div id="p-inp" class="pnl on">
    <div id="sbox" class="sbox"></div>
    <div class="inp-grid">
      <div class="form-group">
        <label>Tanggal laporan</label>
        <input type="date" id="rdt">
      </div>
      <div class="form-group">
        <label>Mode input</label>
        <div class="mode-tabs">
          <button class="mtab on" id="m-b" onclick="M('b')">Sales + Shrinkage</button>
          <button class="mtab" id="m-s" onclick="M('s')">Sales saja</button>
          <button class="mtab" id="m-h" onclick="M('h')">Shrinkage saja</button>
        </div>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label>Pilih toko</label>
      <div class="stabs" id="ssel"></div>
    </div>
    <div class="form-group">
      <label>Paste laporan</label>
      <textarea id="rtx" placeholder="Paste laporan sales DAN/ATAU shrinkage di sini — format bebas, parser otomatis membaca keduanya.&#10;&#10;SALES: Sales 145,459,090 | Transaksi 650 | Basket 223,783 | Member 22.9% | New member 9&#10;&#10;SHRINKAGE: Fruit & vegetable Actual 744,917 Budget 331,170&#10;Frozen Actual 689,385 Budget 283,542&#10;Total shrinkage 2,327,184 | Budget 1,890,968 | MTD 20,992,890"></textarea>
    </div>
    <div class="btn-row">
      <button class="gbtn" id="sbtn" onclick="save()">&#128190; Simpan ke Google Sheets</button>
      <button class="lbtn" onclick="demo()">&#9654; Demo 11 Juni</button>
      <button class="lbtn" onclick="rf()">&#8635; Refresh</button>
      <span class="sstat" id="sst"></span>
    </div>
    <hr class="hr">
    <div class="sec">Status sesi ini</div>
    <div class="sess-grid" id="sgrid"></div>
  </div>

  <div id="p-sal" class="pnl"><div id="sc"><p style="color:var(--muted);padding:20px 0">Memuat data...</p></div></div>
  <div id="p-shr" class="pnl"><div id="shc"><p style="color:var(--muted);padding:20px 0">Memuat data...</p></div></div>
  <div id="p-trf" class="pnl"><div id="tfc"></div></div>
  <div id="p-ins" class="pnl"><div id="inc"></div></div>
  <div id="p-mtd" class="pnl"><div id="mtc"></div></div>

</div>

<script>
var GAS='https://script.google.com/macros/s/AKfycbw0ms1hk5PAtIQ3s9z5deKGOaOSu617g2GKy3E_ROKTMoo_yR3kwwsOjE35MRrV_lzQXA/exec';
var SC=['HW','GS','DL','GSH','SI'];
var SN={HW:'PM Hayam Wuruk',GS:'PM Gatot Subroto',DL:'PM Dalung',GSH:'PM Gunung Sanghyang',SI:'PM Sanur Intaran'};
var TD={HW:117400000,GS:78100000,DL:100000000,GSH:74500000,SI:137900000};
var TM={HW:3522000000,GS:2343000000,DL:3000000000,GSH:2235000000,SI:4137000000};
var TT={HW:587,GS:390,DL:500,GSH:372,SI:689};
var TB={HW:200000,GS:200256,DL:200000,GSH:200269,SI:200145};
var BP={HW:0.016,GS:0.014,DL:0.013,GSH:0.014,SI:0.013};
var COLS={HW:'#00843D',GS:'#E24B4A',DL:'#378ADD',GSH:'#EF9F27',SI:'#634AB7'};
var HS={HW:[97582172,103672305,101734408,99604246,95152981,96282510,105534008,105219057,112368475,108410165],GS:[87074254,76859962,59005519,69738884,66626456,80439383,82523647,80779540,66667160,77823561],DL:[92094614,95083365,101418616,99056503,88906372,92744394,85037426,99160253,85480368,98633371],GSH:[70107822,77373703,67523512,81221146,61801267,69834790,60577242,68405546,62393153,58770360],SI:[144547612,136325974,157003675,150055860,135110685,145903031,141971829,137623716,123394489,138061750]};
var HSH={HW:[1200000,2100000,2350000,3800000,2700000,2500000,2000000,2900000,2600000,2400000],GS:[573974,472472,685252,2007207,1861483,1455820,1277989,2305891,1969550,1809565],DL:[0,1217610,1747830,3523060,2450190,2139820,1456920,2312800,2078450,1359040],GSH:[573974,472472,685252,2007207,1861483,1455820,1277989,2305891,1969550,1809565],SI:[110697,1466657,2090014,4326951,2299785,2414729,1208383,2193912,1715800,1504471]};
var DMAP={'fruit':'Produce','vegetable':'Produce','produce':'Produce','buah':'Produce','butcher':'Butcher','butchery':'Butcher','meat':'Butcher','frozen':'Frozen & Deli','delicatessen':'Frozen & Deli','delicatesen':'Frozen & Deli','dry food':'Grocery','grocery':'Grocery','dry grocery':'Grocery','bakery':'Bakery','pastry':'Bakery','bakers':'Bakery','qsr':'QSR','rte':'RTE','beverage':'Beverage','wine':'Beverage','non food':'Non Food','nonfood':'Non Food','gms':'GMS','japas':'JAPAS','jajan':'JAPAS'};
var ST={sel:null,mode:'b',sess:{},gd:null,conn:false,ch:{}};

function n(s){return parseFloat((s||'').replace(/[^\d.]/g,''))||0;}
function fK(v){v=Math.round(v||0);return v>=1e9?(v/1e9).toFixed(2)+'M':v>=1e6?(v/1e6).toFixed(1)+' jt':v>=1e3?(v/1e3).toFixed(0)+' rb':String(v);}
function pF(v,d){d=d===undefined?2:d;return((v||0)*100).toFixed(d)+'%';}
function fRp(v){return'Rp '+Math.round(v||0).toLocaleString('id-ID');}

function sb(msg,type){var el=document.getElementById('sbox');el.className='sbox '+(type||'info');el.textContent=msg;}
function setConn(s){
  var el=document.getElementById('cpill');
  if(s==='ok'){el.className='conn ok';el.textContent='&#10003; Google Sheets';}
  else if(s==='err'){el.className='conn err';el.textContent='Offline';}
  else{el.className='conn wait';el.innerHTML='<span class="sp"></span> Connecting';}
}

async function gasG(p){
  var qs=Object.keys(p).map(function(k){return k+'='+encodeURIComponent(p[k]);}).join('&');
  var r=await fetch(GAS+'?'+qs+'&_='+Date.now());
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}
async function gasP(d){
  var r=await fetch(GAS,{method:'POST',body:JSON.stringify(d)});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

function buildHist(){
  ST.gd={sales:{},shrink:{}};
  SC.forEach(function(c){
    var ms=HS[c].reduce(function(a,b){return a+b;},0);
    var msh=HSH[c].reduce(function(a,b){return a+b;},0);
    ST.gd.sales[c]={mtd:ms,avg:ms/10,vs_target:ms/10/TD[c]-1,days:10};
    ST.gd.shrink[c]={mtd_shrink:msh,mtd_sales:ms,pct:msh/ms,bdg:BP[c],diff:msh/ms-BP[c]};
  });
}

async function init(){
  document.getElementById('rdt').value=new Date().toISOString().split('T')[0];
  renderSBtns();
  setConn('wait');sb('Menghubungkan ke Google Sheets...','info');
  try{
    var r=await gasG({action:'ping'});
    if(r&&r.status==='ok'&&r.data&&r.data.pong){
      ST.conn=true;setConn('ok');
      sb('Terhubung ke Google Sheets. Data tersimpan permanen.','ok');
      document.getElementById('csync').textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
      var all=await gasG({action:'get_all_data'});
      if(all&&all.status==='ok'&&all.data){
        ST.gd=all.data;
        var hasData=all.data.sales&&Object.keys(all.data.sales).length>0;
        if(!hasData){buildHist();sb('Terhubung. Google Sheet masih kosong — input laporan atau klik Demo 11 Juni.','ok');}
      }else buildHist();
    }else{setConn('err');buildHist();sb('Response tidak valid dari server.','err');}
  }catch(e){setConn('err');buildHist();sb('Koneksi gagal: '+e.message+'. Dashboard berjalan dengan data lokal (1-10 Juni).','err');}
  renderAll();
}

function renderSBtns(){
  var el=document.getElementById('ssel');if(!el)return;
  el.innerHTML=SC.map(function(k){
    var s=ST.sess[k];var cls='stab';
    if(s&&s.sales&&s.shrink)cls+=' hb';else if(s&&s.sales)cls+=' hs';else if(s&&s.shrink)cls+=' hsh';
    return'<button id="b-'+k+'" class="'+cls+'" onclick="sel(\''+k+'\')">'+k+'</button>';
  }).join('');
  document.getElementById('sgrid').innerHTML=SC.map(function(c){
    var s=ST.sess[c];var hs=s&&s.sales,hsh=s&&s.shrink;
    return'<div class="sess-card">'+
    '<div class="sn">'+SN[c].replace('PM ','')+'</div>'+
    '<div class="st">'+
    '<span class="itag it-s" style="opacity:'+(hs?1:.3)+'">S '+(hs?'✓':'—')+'</span>'+
    '<span class="itag it-sh" style="opacity:'+(hsh?1:.3)+'">SH '+(hsh?'✓':'—')+'</span>'+
    '</div>'+
    (hs?'<div class="st" style="margin-top:3px">Sales: '+fK(hs.sales)+'</div>':'')+
    (hsh?'<div class="st">Shrink: '+fK(hsh.total)+'</div>':'')+
    '</div>';
  }).join('');
}
function sel(c){ST.sel=c;document.querySelectorAll('#ssel .stab').forEach(function(b){b.classList.remove('on');});var b=document.getElementById('b-'+c);if(b)b.classList.add('on');}
function M(m){ST.mode=m;['b','s','h'].forEach(function(x){document.getElementById('m-'+x).classList.toggle('on',x===m);});}
function T(n){document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('on',['inp','sal','shr','trf','ins','mtd'][i]===n);});document.querySelectorAll('.pnl').forEach(function(p){p.style.display='none';p.classList.remove('on');});var pnl=document.getElementById('p-'+n);pnl.style.display='block';pnl.classList.add('on');}

function parseSales(txt,code){
  var lines=txt.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  var r={store:code,sales:0,trx:0,basket:0,sales_member:0,member_pct:0,new_member:0,trx_pfs:0,mtd_sales:0,depts:{}};
  var cur=null;
  lines.forEach(function(l){
    var lc=l.toLowerCase();
    if(/^sales[\s:=]/.test(lc)&&!lc.includes('member')&&!lc.includes('mtd')){var m=l.match(/[\d,.]+/);if(m&&n(m[0])>1e6)r.sales=n(m[0]);}
    if(/(total.*sales|penjualan.*hari)/.test(lc)&&!lc.includes('mtd')){var m=l.match(/[\d,.]+/g);if(m){var v=m.map(n).filter(function(x){return x>1e6;});if(v.length)r.sales=Math.max.apply(null,v);}}
    if(/(transaksi|^struk|^trx)/.test(lc)&&!lc.includes('pfs')&&!lc.includes('member')){var m=l.match(/[\d,.]+/);if(m){var v=n(m[0]);if(v>0&&v<9999)r.trx=v;}}
    if(/basket/.test(lc)){var m=l.match(/[\d,.]+/g);if(m){var v=m.map(n).filter(function(x){return x>10000&&x<9999999;});if(v.length)r.basket=v[0];}}
    if(/(sales.*member|member.*sales)/.test(lc)){var m=l.match(/[\d,.]+/);if(m&&n(m[0])>100000)r.sales_member=n(m[0]);}
    if(/(member.*%|pepi plus.*%)/.test(lc)&&!lc.includes('new')&&!lc.includes('baru')){var m=l.match(/[\d,.]+/);if(m){var v=n(m[0]);r.member_pct=v>1?v/100:v;}}
    if(/(new.*member|member.*baru)/.test(lc)){var m=l.match(/\d+/);if(m&&+m[0]<9999)r.new_member=+m[0];}
    if(/(trx.*pfs|struk.*pfs)/.test(lc)){var m=l.match(/\d+/);if(m&&+m[0]<9999)r.trx_pfs=+m[0];}
    if(/(mtd.*sales|sales.*mtd)/.test(lc)){var m=l.match(/[\d,.]+/g);if(m){var v=m.map(n).filter(function(x){return x>1e7;});if(v.length)r.mtd_sales=Math.max.apply(null,v);}}
    var dk=null;Object.keys(DMAP).forEach(function(a){if(!dk&&lc.includes(a))dk=DMAP[a];});
    if(dk){if(!r.depts[dk])r.depts[dk]={sales:0};cur=dk;}
    if(cur&&/(sales|penjualan)/.test(lc)&&!lc.includes('member')&&!lc.includes('total')&&!lc.includes('mtd')){var m=l.match(/[\d,.]+/);if(m&&n(m[0])>100000)r.depts[cur].sales=n(m[0]);}
  });
  if(!r.sales){var t=Object.values(r.depts).reduce(function(s,d){return s+(d.sales||0);},0);if(t>1e6)r.sales=t;}
  return r;
}

function parseShrink(txt,code){
  var lines=txt.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  var r={store:code,total:0,budget_total:0,mtd_actual:0,mtd_budget:0,depts:{}};
  var cur=null;
  lines.forEach(function(l){
    var lc=l.toLowerCase();
    var dk=null;Object.keys(DMAP).forEach(function(a){if(!dk&&lc.includes(a))dk=DMAP[a];});
    if(dk){if(!r.depts[dk])r.depts[dk]={actual:0,budget:0};cur=dk;}
    if(cur&&lc.includes('actual')&&!lc.includes('budget')){var m=l.match(/[\d,.]+/);if(m)r.depts[cur].actual=n(m[0]);}
    if(cur&&lc.includes('budget')&&!lc.includes('mtd')&&!/1-\d+/i.test(l)){var m=l.match(/[\d,.]+/);if(m&&n(m[0])>0)r.depts[cur].budget=n(m[0]);}
    if(/(shrinkage hari ini|total shrinkage)/.test(lc)&&!lc.includes('mtd')){var m=l.match(/[\d,.]+/g);if(m){var v=m.map(n).filter(function(x){return x>100000;});if(v.length)r.total=Math.max.apply(null,v);}}
    if(/budget shrinkage/.test(lc)&&!/1-\d+/i.test(l)&&!lc.includes('mtd')){var m=l.match(/[\d,.]+/g);if(m){var v=m.map(n).filter(function(x){return x>100000;});if(v.length)r.budget_total=n(v[0]);}}
    if(/mtd shrinkage/.test(lc)){var m=l.match(/[\d,.]+/g);if(m)r.mtd_actual=Math.max.apply(null,m.map(n));}
    if(/budget.*1-\d+/i.test(l)){var m=l.match(/[\d,.]+/g);if(m)r.mtd_budget=Math.max.apply(null,m.map(n));}
  });
  if(!r.total)r.total=Object.values(r.depts).reduce(function(s,d){return s+(d.actual||0);},0);
  return r;
}

async function save(){
  var code=ST.sel,txt=document.getElementById('rtx').value.trim(),mode=ST.mode;
  if(!code){sb('Pilih toko dulu.','err');return;}
  if(!txt){sb('Paste laporan dulu.','err');return;}
  var btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='Menyimpan...';
  if(!ST.sess[code])ST.sess[code]={};
  var sd=null,shd=null;
  if(mode==='b'||mode==='s'){sd=parseSales(txt,code);ST.sess[code].sales=sd;}
  if(mode==='b'||mode==='h'){shd=parseShrink(txt,code);ST.sess[code].shrink=shd;}
  var date=document.getElementById('rdt').value;
  if(ST.conn){
    try{
      var res=await gasP({action:'save_full_report',date:date,store:code,sales:sd,shrink:shd});
      if(res.status==='ok'){
        sb(SN[code]+' tersimpan ke Google Sheets!','ok');

        document.getElementById('csync').textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
      }else{sb('Error dari GSheet: '+(res.message||JSON.stringify(res)),'err');}
    }catch(e){sb('Gagal simpan: '+e.message,'err');}
  }else{
    if(!ST.gd)buildHist();
    if(sd){var s=sd.sales||0;var ms=HS[code].reduce(function(a,b){return a+b;},0)+s;
      ST.gd.sales[code]={mtd:ms,avg:ms/11,vs_target:s/TD[code]-1,trx:sd.trx,basket:sd.basket,member_pct:sd.member_pct,mtd_sales:sd.mtd_sales||ms};}
    if(shd){var sh=shd.total||0;var sv=(sd&&sd.sales)||TD[code];var msh=HSH[code].reduce(function(a,b){return a+b;},0)+sh;var msv=HS[code].reduce(function(a,b){return a+b;},0)+sv;
      ST.gd.shrink[code]={mtd_shrink:msh,mtd_sales:msv,pct:msh/msv,bdg:BP[code],diff:msh/msv-BP[code]};}
    sb(SN[code]+' tersimpan lokal (GSheet offline).','info');
  }
  document.getElementById('sst').textContent='';
  btn.disabled=false;btn.textContent='Simpan ke Google Sheets';
  renderSBtns();renderAll();
}

function gd(type,code){
  if(ST.gd&&ST.gd[type]&&ST.gd[type][code])return ST.gd[type][code];
  var s=ST.sess[code];
  if(type==='sales'&&s&&s.sales){var sd=s.sales;var ms=HS[code].reduce(function(a,b){return a+b;},0)+(sd.sales||0);
    return{mtd:ms,avg:ms/11,vs_target:(sd.sales||0)/TD[code]-1,trx:sd.trx,basket:sd.basket,member_pct:sd.member_pct,mtd_sales:sd.mtd_sales||ms};}
  if(type==='shrink'&&s&&s.shrink){var shd=s.shrink;var sh=shd.total||0;var sv=(s.sales&&s.sales.sales)||TD[code];var msh=HSH[code].reduce(function(a,b){return a+b;},0)+sh;var ms2=HS[code].reduce(function(a,b){return a+b;},0)+sv;
    return{mtd_shrink:msh,mtd_sales:ms2,pct:msh/ms2,bdg:BP[code],diff:msh/ms2-BP[code]};}
  if(type==='sales'){var ms3=HS[code].reduce(function(a,b){return a+b;},0);return{mtd:ms3,avg:ms3/10,vs_target:ms3/10/TD[code]-1};}
  var sh2=HSH[code].reduce(function(a,b){return a+b;},0);var ms4=HS[code].reduce(function(a,b){return a+b;},0);
  return{mtd_shrink:sh2,mtd_sales:ms4,pct:sh2/ms4,bdg:BP[code],diff:sh2/ms4-BP[code]};
}

    var r=await gasG({action:'ping'});
    if(r&&r.status==='ok'&&r.data&&r.data.pong){
      ST.conn=true;setConn('ok');
      var all=await gasG({action:'get_all_data'});
      if(all&&all.status==='ok'&&all.data){ST.gd=all.data;var hasData=all.data.sales&&Object.keys(all.data.sales).length>0;if(!hasData)buildHist();}
      else buildHist();
      sb('Refresh berhasil — data diambil dari Google Sheets.','ok');
      document.getElementById('csync').textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    }else{setConn('err');sb('Response error.','err');}
  }catch(e){setConn('err');sb('Error: '+e.message,'err');}
  renderAll();
}
